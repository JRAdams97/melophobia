{% extends 'base.html' %}
{% block content %}

<div>
    <h1 class="font-title text-2xl font-bold">Producer Form</h1>
    <div class="divider"></div>
    <div class="flex items-center justify-center">
        <form method="POST">
            <div class="space-y-12">
                {% csrf_token %}
                <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 w-80">
                    <!-- Name field -->
                    <label class="form-control w-full max-w-xs">
                        <div class="label">
                            <span class="label-text text-neutral">{{ form.name.label }}</span>
                        </div>
                        <input class="input input-bordered mt-2" type="text" name="name"
                               value="{{ form.name.value|default:'' }}"/>

                        {% if form.name.errors %}

                        <div class="label">
                            <span class="label-text-alt text-error text-xs">{{ form.name.errors }}</span>
                        </div>

                        {% endif %}

                    </label>
                    <!-- Sort Name field -->
                    <label class="form-control w-full max-w-xs">
                        <div class="label">
                            <span class="label-text text-neutral">{{ form.sort_name.label }}</span>
                        </div>
                        <input class="input input-bordered mt-2" type="text" name="sort_name"
                               value="{{ form.sort_name.value|default:'' }}"/>

                        {% if form.sort_name.errors %}

                        <div class="label">
                            <span class="label-text-alt text-error text-xs">{{ form.sort_name.errors }}</span>
                        </div>

                        {% endif %}

                    </label>
                    <!-- Gender field -->
                    <label class="form-control w-full max-w-xs">
                        <div class="label">
                            <span class="label-text text-neutral">{{ form.gender.label }}</span>
                        </div>
                        <select class="select select-bordered w-full mt-2" name="gender">

                            {% for value, label in form.gender.field.choices %}

                            <option value="{{ value }}"
                                    {% if value == form.gender.value %}selected{% endif %}>{{ label }}</option>

                            {% endfor %}

                        </select>

                        {% if form.gender.errors %}

                        <div class="label">
                            <span class="label-text-alt text-error text-xs">{{ form.gender.errors }}</span>
                        </div>

                        {% endif %}

                    </label>
                    <!-- Birth Date field -->
                    <label class="form-control w-full max-w-xs">
                        <div class="label">
                            <span class="label-text text-neutral">{{ form.birth_date.label }}</span>
                        </div>
                        <input class="input input-bordered mt-2" type="text" name="birth_date"
                               value="{{ form.birth_date.value|default:'' }}"/>

                        {% if form.birth_date.errors %}

                        <div class="label">
                            <span class="label-text-alt text-error text-xs">{{ form.birth_date.errors }}</span>
                        </div>

                        {% endif %}

                    </label>
                    <!-- Birth Location field -->
                    <label class="form-control w-full max-w-xs">
                        <div class="label">
                            <span class="label-text text-neutral">{{ form.birth_location.label }}</span>
                        </div>
                        <select class="select select-bordered w-full mt-2" name="birth_location">

                            {% for value, label in form.birth_location.field.choices %}

                            <option value="{{ value }}"
                                    {% if value == form.birth_location.value %}selected{% endif %}>{{ label }}</option>

                            {% endfor %}

                        </select>

                        {% if form.birth_location.errors %}

                        <div class="label">
                            <span class="label-text-alt text-error text-xs">{{ form.birth_location.errors }}</span>
                        </div>

                        {% endif %}

                    </label>
                    <!-- Death Date field -->
                    <label class="form-control w-full max-w-xs">
                        <div class="label">
                            <span class="label-text text-neutral">{{ form.death_date.label }}</span>
                        </div>
                        <input class="input input-bordered mt-2" type="text" name="death_date"
                               value="{{ form.death_date.value|default:'' }}"/>

                        {% if form.death_date.errors %}

                        <div class="label">
                            <span class="label-text-alt text-error text-xs">{{ form.death_date.errors }}</span>
                        </div>

                        {% endif %}

                    </label>
                    <!-- Is Favourite? field -->
                    <label class="form-control w-full max-w-xs">
                        <div class="label">
                            <span class="label-text text-neutral">{{ form.is_favourite.label }}</span>
                        </div>
                        <input class="block checkbox mt-2" type="checkbox" name="is_favourite"
                               {% if form.is_favourite.value %}checked{% endif %} />
                    </label>
                    <!-- Image Reference field -->
                    <label class="form-control w-full max-w-xs">
                        <div class="label">
                            <span class="label-text text-neutral">{{ form.image_ref.label }}</span>
                        </div>
                        <select class="select select-bordered w-full mt-2" name="image_ref">

                            {% for value, label in form.image_ref.field.choices %}

                            <option value="{{ value }}"
                                    {% if value == form.image_ref.value %}selected{% endif %}>{{ label }}</option>

                            {% endfor %}

                        </select>

                        {% if form.image_ref.errors %}

                        <div class="label">
                            <span class="label-text-alt text-error text-xs">{{ form.image_ref.errors }}</span>
                        </div>

                        {% endif %}

                    </label>
                </div>
                <button class="btn btn-neutral mt-6" type="submit">Submit</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
