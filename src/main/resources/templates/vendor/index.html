<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{fragments/layout :: head(pageTitle='Vendors')}">
  <title></title>
</head>
<body>
<div th:insert="~{fragments/navbar :: navbar}"></div>
<div class="container-fluid mt-5" style="max-width: 1800px">
  <h3>Vendors</h3>
  <hr/>
  <table class="table table-striped">
    <thead>
    <tr>
      <th scope="col">Name</th>
      <th scope="col">Address</th>
      <th scope="col">Postcode</th>
      <th scope="col">Location</th>
      <th scope="col" style="width: 2.5%">Edit</th>
      <th scope="col" style="width: 2.5%">Delete</th>
    </tr>
    </thead>
    <tbody>
    <tr scope="row" th:each="vendor: ${vendors}">
      <td><a th:href="@{/vendor/{id}(id = ${vendor.vendorId})}" th:text="${vendor.name}"></a></td>
      <td th:text="${vendor.address}"></td>
      <td th:text="${vendor.postcode}"></td>
      <td th:if="${vendor.location.region}" th:text="${vendor.location.region.regionAbbreviation}
           ? ${vendor.location.region.name} + ' (' + ${vendor.location.region.regionAbbreviation} + ')'
           : ${vendor.location.region.name}"></td>
      <td>
        <a th:href="@{/vendor/edit/{id}(id = ${vendor.vendorId})}">
          <button class="btn btn-primary btn-sm"><i class="bi-pencil-fill"></i></button>
        </a>
      </td>
      <td>
        <a th:href="@{/vendor/delete/{id}(id = ${vendor.vendorId})}">
          <button class="btn btn-danger btn-sm"><i class="bi-trash-fill"></i></button>
        </a>
      </td>
    </tr>
    </tbody>
  </table>
  <div class="container-fluid" style="max-width: 1800px">
    <div class="row text-end mb-4">
      <div class="col-12">
        <a th:href="@{/vendor/add}">
          <button type="submit" class="btn btn-primary" th:text="Add"></button>
        </a>
      </div>
    </div>
  </div>
</div>
<div th:insert="~{fragments/layout :: footer}"></div>
</body>
</html>
